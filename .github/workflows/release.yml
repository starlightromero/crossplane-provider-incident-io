name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

env:
  GO_VERSION: "1.26"
  IMAGE_NAME: ghcr.io/starlightromero/crossplane-provider-incident-io
  NAME: crossplane-provider-incident-io
  CONTROLLER_GEN_VERSION: "v0.20.0"

jobs:
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      new-release: ${{ steps.release.outputs.new_release_published }}
      version: ${{ steps.release.outputs.new_release_version }}
      tag: ${{ steps.release.outputs.new_release_git_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Semantic Release
        id: release
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-push:
    name: Build and Push Image
    needs: semantic-release
    runs-on: ubuntu-latest
    if: needs.semantic-release.outputs.new-release == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=v${{ needs.semantic-release.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ needs.semantic-release.outputs.version }}
            type=sha

      - name: Build and push multi-arch image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.semantic-release.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Build multi-arch Crossplane packages and push as OCI manifest list
  # ---------------------------------------------------------------------------
  package:
    name: Crossplane Package (${{ matrix.arch }})
    needs: [semantic-release, build-push]
    runs-on: ubuntu-latest
    if: needs.semantic-release.outputs.new-release == 'true'
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install controller-gen
        run: go install sigs.k8s.io/controller-tools/cmd/controller-gen@${{ env.CONTROLLER_GEN_VERSION }}

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Install Crossplane CLI
        run: |
          curl -sL "https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh" | sh
          sudo mv crossplane /usr/local/bin/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate CRDs
        run: make generate

      - name: Pull platform-specific runtime image
        run: |
          docker pull --platform linux/${{ matrix.arch }} \
            ${{ env.IMAGE_NAME }}:${{ needs.semantic-release.outputs.version }}

      - name: Build Crossplane package
        run: |
          cd package
          crossplane xpkg build \
            --package-root=. \
            --embed-runtime-image=${{ env.IMAGE_NAME }}:${{ needs.semantic-release.outputs.version }} \
            -o ../provider-${{ env.NAME }}-${{ matrix.arch }}.xpkg

      - name: Push arch-specific Crossplane package
        run: |
          crossplane xpkg push \
            -f provider-${{ env.NAME }}-${{ matrix.arch }}.xpkg \
            ${{ env.IMAGE_NAME }}:${{ needs.semantic-release.outputs.version }}-${{ matrix.arch }}

      - name: Upload xpkg artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: xpkg-${{ matrix.arch }}
          path: provider-${{ env.NAME }}-${{ matrix.arch }}.xpkg

  # ---------------------------------------------------------------------------
  # Create multi-arch manifest list for the Crossplane package
  # ---------------------------------------------------------------------------
  package-manifest:
    name: Crossplane Package Manifest
    runs-on: ubuntu-latest
    needs: [semantic-release, package]
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker manifest create \
            ${{ env.IMAGE_NAME }}:${{ needs.semantic-release.outputs.version }} \
            --amend ${{ env.IMAGE_NAME }}:${{ needs.semantic-release.outputs.version }}-amd64 \
            --amend ${{ env.IMAGE_NAME }}:${{ needs.semantic-release.outputs.version }}-arm64

          docker manifest annotate \
            ${{ env.IMAGE_NAME }}:${{ needs.semantic-release.outputs.version }} \
            ${{ env.IMAGE_NAME }}:${{ needs.semantic-release.outputs.version }}-amd64 \
            --os linux --arch amd64

          docker manifest annotate \
            ${{ env.IMAGE_NAME }}:${{ needs.semantic-release.outputs.version }} \
            ${{ env.IMAGE_NAME }}:${{ needs.semantic-release.outputs.version }}-arm64 \
            --os linux --arch arm64

          docker manifest push \
            ${{ env.IMAGE_NAME }}:${{ needs.semantic-release.outputs.version }}

  # ---------------------------------------------------------------------------
  # Attach artifacts to GitHub Release and generate SBOM
  # ---------------------------------------------------------------------------
  release-assets:
    name: Release Assets
    runs-on: ubuntu-latest
    needs: [semantic-release, package-manifest]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download xpkg artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: xpkg-*
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: sbom.cdx.json

      - name: Attach artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.semantic-release.outputs.tag }} \
            provider-${{ env.NAME }}-amd64.xpkg \
            provider-${{ env.NAME }}-arm64.xpkg \
            sbom.cdx.json

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit ${{ needs.semantic-release.outputs.tag }} --draft=false
