name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

env:
  GO_VERSION: "1.26"
  IMAGE_NAME: ghcr.io/starlightromero/crossplane-provider-incident-io
  NAME: crossplane-provider-incident-io
  CONTROLLER_GEN_VERSION: "v0.20.0"

jobs:
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      new-release: ${{ steps.release.outputs.new_release_published }}
      version: ${{ steps.release.outputs.new_release_version }}
      tag: ${{ steps.release.outputs.new_release_git_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Semantic Release
        id: release
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Build and push per-arch controller images to GHCR
  # ---------------------------------------------------------------------------
  build-push:
    name: Build and Push Image (${{ matrix.arch }})
    needs: semantic-release
    runs-on: ubuntu-latest
    if: needs.semantic-release.outputs.new-release == 'true'
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push single-arch image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          platforms: linux/${{ matrix.arch }}
          tags: ${{ env.IMAGE_NAME }}:${{ needs.semantic-release.outputs.version }}-${{ matrix.arch }}
          build-args: |
            VERSION=${{ needs.semantic-release.outputs.version }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Create multi-arch manifest for the controller image
  # ---------------------------------------------------------------------------
  image-manifest:
    name: Controller Image Manifest
    runs-on: ubuntu-latest
    needs: [semantic-release, build-push]
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push controller image manifest
        run: |
          VERSION="${{ needs.semantic-release.outputs.version }}"

          docker manifest create --amend \
            ${{ env.IMAGE_NAME }}:${VERSION} \
            ${{ env.IMAGE_NAME }}:${VERSION}-amd64 \
            ${{ env.IMAGE_NAME }}:${VERSION}-arm64

          docker manifest annotate \
            ${{ env.IMAGE_NAME }}:${VERSION} \
            ${{ env.IMAGE_NAME }}:${VERSION}-amd64 \
            --os linux --arch amd64

          docker manifest annotate \
            ${{ env.IMAGE_NAME }}:${VERSION} \
            ${{ env.IMAGE_NAME }}:${VERSION}-arm64 \
            --os linux --arch arm64

          docker manifest push ${{ env.IMAGE_NAME }}:${VERSION}

  # ---------------------------------------------------------------------------
  # Build Crossplane xpkg per-arch with embedded runtime
  # ---------------------------------------------------------------------------
  package:
    name: Crossplane Package (${{ matrix.arch }})
    needs: [semantic-release, build-push]
    runs-on: ubuntu-latest
    if: needs.semantic-release.outputs.new-release == 'true'
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install controller-gen
        run: go install sigs.k8s.io/controller-tools/cmd/controller-gen@${{ env.CONTROLLER_GEN_VERSION }}

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Install Crossplane CLI
        run: |
          curl -sL "https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh" | sh
          sudo mv crossplane /usr/local/bin/

      - name: Generate CRDs
        run: make generate

      - name: Copy CRDs to package directory
        run: |
          if [ -d "package/crds" ]; then
            echo "CRDs already in package/crds"
          else
            find . -path ./package -prune -o -name '*.yaml' -path '*/crds/*' \
              -print -exec cp {} package/ \;
          fi
          echo "==> Package directory contents:"
          ls -la package/

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Pull arch-specific controller image
        run: |
          docker pull --platform linux/${{ matrix.arch }} \
            ${{ env.IMAGE_NAME }}:${{ needs.semantic-release.outputs.version }}-${{ matrix.arch }}

      - name: Build Crossplane package with embedded runtime
        run: |
          crossplane xpkg build \
            --package-root=package \
            --embed-runtime-image=${{ env.IMAGE_NAME }}:${{ needs.semantic-release.outputs.version }}-${{ matrix.arch }} \
            -o provider-${{ env.NAME }}-${{ matrix.arch }}.xpkg

      - name: Push arch-specific xpkg
        run: |
          crossplane xpkg push \
            -f provider-${{ env.NAME }}-${{ matrix.arch }}.xpkg \
            ${{ env.IMAGE_NAME }}:v${{ needs.semantic-release.outputs.version }}-xpkg-${{ matrix.arch }}

      - name: Upload xpkg artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: xpkg-${{ matrix.arch }}
          path: provider-${{ env.NAME }}-${{ matrix.arch }}.xpkg

  # ---------------------------------------------------------------------------
  # Create multi-arch manifest list for the xpkg
  # ---------------------------------------------------------------------------
  package-manifest:
    name: Crossplane Package Manifest
    runs-on: ubuntu-latest
    needs: [semantic-release, package]
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest list
        run: |
          VERSION="${{ needs.semantic-release.outputs.version }}"

          docker manifest create \
            ${{ env.IMAGE_NAME }}:v${VERSION}-xpkg \
            ${{ env.IMAGE_NAME }}:v${VERSION}-xpkg-amd64 \
            ${{ env.IMAGE_NAME }}:v${VERSION}-xpkg-arm64

          docker manifest annotate \
            ${{ env.IMAGE_NAME }}:v${VERSION}-xpkg \
            ${{ env.IMAGE_NAME }}:v${VERSION}-xpkg-amd64 \
            --os linux --arch amd64

          docker manifest annotate \
            ${{ env.IMAGE_NAME }}:v${VERSION}-xpkg \
            ${{ env.IMAGE_NAME }}:v${VERSION}-xpkg-arm64 \
            --os linux --arch arm64

          docker manifest push ${{ env.IMAGE_NAME }}:v${VERSION}-xpkg

  # ---------------------------------------------------------------------------
  # Attach artifacts to GitHub Release and generate SBOM
  # ---------------------------------------------------------------------------
  release-assets:
    name: Release Assets
    runs-on: ubuntu-latest
    needs: [semantic-release, package-manifest, image-manifest]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download xpkg artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: xpkg-*
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: sbom.cdx.json

      - name: Attach artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.semantic-release.outputs.tag }} \
            provider-${{ env.NAME }}-amd64.xpkg \
            provider-${{ env.NAME }}-arm64.xpkg \
            sbom.cdx.json

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit ${{ needs.semantic-release.outputs.tag }} --draft=false
