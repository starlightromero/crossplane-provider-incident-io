# SonarQube Configuration for Crossplane Provider Incident.io
sonar.projectKey=avodah-inc_crossplane-provider-incident-io
sonar.organization=avodah-inc
sonar.projectName=crossplane-provider-incident-io

# Source configuration
sonar.sources=.
sonar.language=go

# Exclude generated code and build artifacts
sonar.exclusions=\
  apis/**/zz_*.go,\
  internal/controller/**/zz_*.go,\
  package/crds/**,\
  bin/**,\
  _output/**,\
  hack/**,\
  examples/**,\
  *.md

# Go coverage report
sonar.go.coverage.reportPaths=coverage.out
